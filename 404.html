<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Aura Music</title>
    <script>
      // GitHub Pages SPA redirect: preserve the deep link as a query param,
      // then restore it in index.html before the router mounts.
      // See https://github.com/rafgraph/spa-github-pages
      var pathSegmentsToKeep = 1; // /Aura-music/
      var l = window.location;
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + pathSegmentsToKeep)
            .join('/') +
          '/?/' +
          l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash,
      );
    </script>
  </head>
  <body></body>
</html>
